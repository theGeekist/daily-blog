# Pre-commit hooks for daily-blog
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: basedpyright-local
        name: basedpyright (.venv)
        entry: >-
          bash -lc "test -x .venv/bin/basedpyright || { echo 'Missing .venv or basedpyright. Run make setup'; exit 1; }; .venv/bin/basedpyright"
        language: system
        pass_filenames: false
      - id: unittest-fast-suite
        name: unittest fast suite (.venv)
        entry: >-
          bash -lc "test -x .venv/bin/python || { echo 'Missing .venv. Run make setup'; exit 1; }; .venv/bin/python tests/run_suites.py precommit"
        language: system
        pass_filenames: false

# Exclude common generated and cache directories
exclude: |
  (?x)(
      ^\.venv/|
      ^venv/|
      ^__pycache__/|
      ^\.ruff_cache/|
      ^\.pytest_cache/|
      ^data/.*\.(db|jsonl)$
  )
