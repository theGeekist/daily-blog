# Log rotation configuration for daily-blog pipeline
#
# Installation:
#   sudo cp ops/logrotate.conf /etc/logrotate.d/daily-blog
#   sudo logrotate -f /etc/logrotate.d/daily-blog  # Test immediately
#
# Verification:
#   sudo logrotate -d /etc/logrotate.d/daily-blog  # Dry-run debug mode

/Users/jasonnathan/Repos/daily-blog/data/pipeline.log {
    # Rotate daily
    daily

    # Keep last 14 days of logs
    rotate 14

    # Create new log file with same permissions
    create 644 jasonnathan staff

    # Compress rotated logs (except the most recent one)
    compress
    delaycompress

    # Don't rotate if log file is empty
    notifempty

    # Don't report error if log file is missing
    missingok

    # Truncate instead of creating new file (safer for running processes)
    # Remove this line if pipeline closes log file after each run
    copytruncate

    # Include date in rotated filename for easier identification
    dateext
    dateformat -%Y%m%d

    # Optional: Email logs on rotation (configure mail command first)
    # mail alert@example.com
    # mailfirst
}
